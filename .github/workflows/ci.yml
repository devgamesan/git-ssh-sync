name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --locked

      - name: Run Ruff lint
        run: uv run ruff check src tests manual_tests

      - name: Check Ruff formatting
        run: uv run ruff format --check src tests manual_tests

      - name: Run tests
        run: uv run pytest
